name: Actualisation Intelligence Territoriale

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v3

      - name: Installer Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Exécuter le pipeline (Veille & Friches)
        run: python automatisation.py

      - name: Sauvegarder les fichiers JSON générés
        run: |
          git config --global user.name "Data Robot"
          git config --global user.email "robot@example.com"
          git add veille.json friches_national.json
          git commit -m "Actualisation quotidienne : Veille & Friches" || echo "Pas de changement"
          git push
